model:
  name: simple_resnet
  num_classes: 10
  num_blocks: [2, 2, 2, 2]

data:
  train_dir: data/train
  val_dir: data/val
  test_dir: data/test
  image_size: 32
  normalize: cifar
  num_workers: 4

training:
  epochs: 100
  batch_size: 128
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  lr_scheduler: cosine
  warmup_epochs: 5

checkpoint:
  save_dir: checkpoints/resnet
  save_every: 10

logging:
  log_file: logs/resnet_train.log
