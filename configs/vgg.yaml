model:
  name: vgg
  variant: vgg16
  num_classes: 10
  batch_norm: true
  dropout: 0.5

data:
  train_dir: data/train
  val_dir: data/val
  test_dir: data/test
  image_size: 224
  normalize: imagenet
  num_workers: 4

training:
  epochs: 60
  batch_size: 64
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 5.0e-4
  lr_scheduler: step
  lr_step_size: 20
  lr_gamma: 0.1

checkpoint:
  save_dir: checkpoints/vgg
  save_every: 10

logging:
  log_file: logs/vgg_train.log
